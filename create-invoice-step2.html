<script>
    const getApiUrl = (path) => {
        const isCapacitor = window.location.origin.includes('localhost') && !window.location.port;
        const base = isCapacitor ? 'http://10.0.2.2:3000' : '';
        return `${base}${path}`;
    };

    const sameAddressCheckbox = document.getElementById('same-address');
    const shippingFields = document.getElementById('shipping-fields');
    const clientSearchInput = document.getElementById('client-name');
    const suggestionsBox = document.getElementById('client-suggestions');

    // List of clients fetched from server
    let globalClients = [];

    async function fetchClients() {
        try {
            const res = await fetch(getApiUrl('/api/clients'));
            globalClients = await res.json();
        } catch (err) {
            console.error('Failed to fetch clients:', err);
        }
    }

    sameAddressCheckbox.addEventListener('change', (e) => {
        if (e.target.checked) {
            shippingFields.classList.add('opacity-50', 'pointer-events-none');
        } else {
            shippingFields.classList.remove('opacity-50', 'pointer-events-none');
        }
    });

    clientSearchInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase().trim();
        if (!query) {
            suggestionsBox.classList.add('hidden');
            return;
        }

        const matches = globalClients.filter(c => 
            c.name.toLowerCase().includes(query) || 
            (c.company && c.company.toLowerCase().includes(query))
        );

        if (matches.length === 0) {
            suggestionsBox.classList.add('hidden');
            return;
        }

        suggestionsBox.innerHTML = matches.map(c => `
            <div data-id="${c.id}" class="suggestion-item p-3 hover:bg-surface-container-low cursor-pointer flex items-center gap-3 border-b border-outline-variant/30">
                <div class="w-8 h-8 rounded-full bg-secondary-container text-on-secondary-container flex items-center justify-center font-bold text-xs">
                    ${c.initials || c.name.slice(0, 2).toUpperCase()}
                </div>
                <div>
                    <p class="font-body-md font-bold">${c.name}</p>
                    <p class="text-xs text-outline">${c.email || c.company || ''}</p>
                </div>
            </div>
        `).join('');

        suggestionsBox.classList.remove('hidden');

        // Bind clicks on suggestions
        suggestionsBox.querySelectorAll('.suggestion-item').forEach(item => {
            item.addEventListener('click', () => {
                const clientId = item.getAttribute('data-id');
                const client = globalClients.find(c => c.id === clientId);
                if (client) {
                    autofillClient(client);
                }
                suggestionsBox.classList.add('hidden');
            });
        });
    });

    function autofillClient(client) {
        clientSearchInput.value = client.name;
        document.getElementById('gstin').value = client.gstin || '';
        
        // Match state select
        const stateSelect = document.getElementById('place-supply');
        if (client.state) {
            for (let i = 0; i < stateSelect.options.length; i++) {
                if (stateSelect.options[i].text.toLowerCase().includes(client.state.toLowerCase())) {
                    stateSelect.selectedIndex = i;
                    break;
                }
            }
        }

        // Addresses
        document.getElementById('billing-street').value = [client.address1, client.address2, client.address3].filter(Boolean).join(', ');
        document.getElementById('billing-city').value = client.city || '';
        document.getElementById('billing-pin').value = client.pincode || '';
        document.getElementById('billing-state').value = client.state || '';

        // Contact
        document.getElementById('contact-person').value = client.name || '';
        document.getElementById('contact-email').value = client.email || '';
        document.getElementById('contact-phone').value = client.phone ? client.phone.replace('+91', '').trim() : '';
    }

    clientSearchInput.addEventListener('focus', () => {
        if (clientSearchInput.value.trim() !== '') {
            suggestionsBox.classList.remove('hidden');
        }
    });

    // Hide suggestions when clicking outside
    document.addEventListener('click', (e) => {
        if (!clientSearchInput.contains(e.target) && !suggestionsBox.contains(e.target)) {
            suggestionsBox.classList.add('hidden');
        }
    });

    // Load draft and fetch clients on load
    document.addEventListener('DOMContentLoaded', async () => {
        await fetchClients();

        const draft = JSON.parse(localStorage.getItem('invoice_draft_step2') || '{}');
        if (draft.clientName) {
            clientSearchInput.value = draft.clientName;
            document.getElementById('gstin').value = draft.gstin || '';
            document.getElementById('place-supply').value = draft.placeOfSupply || '';
            document.getElementById('billing-street').value = draft.billingStreet || '';
            document.getElementById('billing-city').value = draft.billingCity || '';
            document.getElementById('billing-pin').value = draft.billingPin || '';
            document.getElementById('billing-state').value = draft.billingState || '';
            
            sameAddressCheckbox.checked = draft.sameAddress !== false;
            if (!sameAddressCheckbox.checked) {
                shippingFields.classList.remove('opacity-50', 'pointer-events-none');
                document.getElementById('shipping-street').value = draft.shippingStreet || '';
                document.getElementById('shipping-city').value = draft.shippingCity || '';
                document.getElementById('shipping-pin').value = draft.shippingPin || '';
                document.getElementById('shipping-state').value = draft.shippingState || '';
            }

            document.getElementById('contact-person').value = draft.contactPerson || '';
            document.getElementById('contact-email').value = draft.contactEmail || '';
            document.getElementById('contact-phone').value = draft.contactPhone || '';
        }

        // Section animations
        document.querySelectorAll('section').forEach((section, index) => {
            section.style.opacity = '0';
            section.style.transform = 'translateY(20px)';
            section.style.transition = 'all 0.4s ease-out ' + (index * 0.1) + 's';
            
            setTimeout(() => {
                section.style.opacity = '1';
                section.style.transform = 'translateY(0)';
            }, 50);
        });
    });

    document.getElementById('client-details-form').addEventListener('submit', (e) => {
        e.preventDefault();

        const step2Data = {
            clientName: clientSearchInput.value.trim(),
            gstin: document.getElementById('gstin').value.trim(),
            placeOfSupply: document.getElementById('place-supply').value,
            billingStreet: document.getElementById('billing-street').value.trim(),
