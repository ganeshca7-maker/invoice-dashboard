                    <label class="font-label-md text-label-md text-on-surface-variant">Invoice number</label>
                    <!-- Settings Trigger Button -->
                    <button type="button" id="btn-numbering-settings" class="text-on-surface-variant hover:text-secondary p-1 rounded-full hover:bg-surface-container-low transition-colors flex items-center justify-center">

            </div>
            <div class="flex flex-col gap-sm">

            <div id="optional-fields-container" class="hidden border-t border-outline-variant/30 p-md space-y-md">

                    <div class="flex flex-col gap-sm">

                    </div>
                    <div class="flex flex-col gap-sm">

<!-- Numbering Settings Modal Popup -->
<div id="numbering-settings-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-[100] p-4 hidden">
    <div class="bg-white border border-outline-variant/30 rounded-2xl w-full max-w-md shadow-2xl max-h-[85vh] overflow-y-auto flex flex-col">
        <div class="px-md py-4 bg-surface-container border-b border-outline-variant/30 flex justify-between items-center">
            <h3 class="font-bold text-on-surface text-base flex items-center gap-sm">
                <span class="material-symbols-outlined text-secondary">settings</span>
                Numbering Settings
            </h3>
            <button type="button" id="btn-close-settings-modal" class="material-symbols-outlined text-outline hover:text-primary transition-colors">close</button>
        </div>
        <form id="numbering-settings-form" class="p-md space-y-md">
            <!-- Starting Number -->
            <div class="flex flex-col gap-xs">
                <label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider font-medium">Starting no. *</label>
                <input id="popup-start-no" type="number" required min="1" class="h-10 px-sm border border-outline-variant rounded-lg bg-surface-bright focus:border-secondary outline-none text-sm font-numeric-data w-full" value="1"/>
            </div>
            <!-- Width of Numerical Part -->
            <div class="flex flex-col gap-xs">
                <label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider font-medium">Width of numerical part *</label>
                <input id="popup-num-width" type="number" required min="1" class="h-10 px-sm border border-outline-variant rounded-lg bg-surface-bright focus:border-secondary outline-none text-sm font-numeric-data w-full" value="4"/>
            </div>
            <!-- Prefill with Zero -->
            <div class="flex items-center justify-between p-sm bg-surface rounded-lg border border-outline-variant/20">
                <label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider cursor-pointer select-none font-medium" for="popup-prefill-zero">Prefill with zero</label>
                <label class="inline-flex items-center cursor-pointer">
                    <input id="popup-prefill-zero" checked type="checkbox" class="sr-only peer"/>
                    <div class="relative w-9 h-5 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-secondary"></div>
                </label>
            </div>
            <!-- Prefix -->
            <div class="flex flex-col gap-xs">
                <label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider font-medium">Prefix</label>
                <input id="popup-prefix" type="text" class="h-10 px-sm border border-outline-variant rounded-lg bg-surface-bright focus:border-secondary outline-none text-sm w-full" placeholder="e.g. INV-"/>
            </div>
            <!-- Suffix -->
            <div class="flex flex-col gap-xs">
                <label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider font-medium">Suffix</label>
                <input id="popup-suffix" type="text" class="h-10 px-sm border border-outline-variant rounded-lg bg-surface-bright focus:border-secondary outline-none text-sm w-full" placeholder="e.g. FY26"/>
            </div>
            <!-- Starting Date & Reset Date -->
            <div class="grid grid-cols-2 gap-sm">
                <div class="flex flex-col gap-xs">
                    <label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider font-medium">Starting date *</label>
                    <input id="popup-start-date" type="date" required class="h-10 px-sm border border-outline-variant rounded-lg bg-surface-bright focus:border-secondary outline-none text-xs w-full"/>
                </div>
                <div class="flex flex-col gap-xs">
                    <label class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider font-medium">Reset date</label>
                    <input id="popup-reset-date" type="date" class="h-10 px-sm border border-outline-variant rounded-lg bg-surface-bright focus:border-secondary outline-none text-xs w-full"/>
                </div>
            </div>
            <p id="date-error" class="text-[10px] text-error hidden">Reset Date cannot be earlier than Starting Date.</p>

            <div class="flex justify-end pt-sm gap-2 border-t border-outline-variant/20">
                <button id="btn-cancel-settings-modal" type="button" class="px-md py-2 border border-outline-variant/30 rounded-lg text-xs font-semibold text-on-surface-variant hover:bg-surface-container-low transition-colors">Cancel</button>

<script>
    // Collapsible Optional Fields Logic
    const btnToggleOptional = document.getElementById('btn-toggle-optional');
    const optionalContainer = document.getElementById('optional-fields-container');
    const optionalArrow = document.getElementById('optional-arrow');

    btnToggleOptional.addEventListener('click', () => {
        const isHidden = optionalContainer.classList.contains('hidden');
        if (isHidden) {
            optionalContainer.classList.remove('hidden');
            optionalArrow.style.transform = 'rotate(180deg)';
        } else {
            optionalContainer.classList.add('hidden');
            optionalArrow.style.transform = 'rotate(0deg)';
        }
    });

    // Numbering Settings Modal Popup Logic
    const btnOpenSettings = document.getElementById('btn-numbering-settings');
    const btnCloseSettingsX = document.getElementById('btn-close-settings-modal');
    const btnCloseSettingsCancel = document.getElementById('btn-cancel-settings-modal');
    const modalSettings = document.getElementById('numbering-settings-modal');
    const formSettings = document.getElementById('numbering-settings-form');
    
    // Popup inputs
    const popupStartNo = document.getElementById('popup-start-no');
    const popupNumWidth = document.getElementById('popup-num-width');
    const popupPrefillZero = document.getElementById('popup-prefill-zero');
    const popupPrefix = document.getElementById('popup-prefix');
    const popupSuffix = document.getElementById('popup-suffix');
    const popupStartDate = document.getElementById('popup-start-date');
    const popupResetDate = document.getElementById('popup-reset-date');

    // Error messages
    const prefixError = document.getElementById('prefix-error');
    const suffixError = document.getElementById('suffix-error');
    const dateError = document.getElementById('date-error');

    // Main Invoice number box
    const invoiceInput = document.getElementById('invoice-num');

    // Helper to format invoice number
    function getFormattedInvoiceNo(prefix, startNo, width, prefill, suffix) {
        let numStr = String(startNo);
        if (prefill) {
            numStr = numStr.padStart(width, '0');
        }
        return `${prefix}${numStr}${suffix}`;
    }

    btnOpenSettings.addEventListener('click', () => {
        modalSettings.classList.remove('hidden');
    });

    const closeModal = () => {
        modalSettings.classList.add('hidden');
        // Clear validation errors on close
        prefixError.classList.add('hidden');
        suffixError.classList.add('hidden');
        dateError.classList.add('hidden');
    };

    btnCloseSettingsX.addEventListener('click', closeModal);
    btnCloseSettingsCancel.addEventListener('click', closeModal);
    modalSettings.addEventListener('click', (e) => {
        if (e.target === modalSettings) closeModal();
    });

    formSettings.addEventListener('submit', (e) => {
        e.preventDefault();

        // 1. Validation (Date validation only)
        let isValid = true;

        const prefixVal = popupPrefix.value;
        const suffixVal = popupSuffix.value;

        const startDateVal = popupStartDate.value;
        const resetDateVal = popupResetDate.value;

        if (resetDateVal && startDateVal && new Date(resetDateVal) < new Date(startDateVal)) {
            dateError.classList.remove('hidden');
            isValid = false;
        } else {
            dateError.classList.add('hidden');
        }

        if (!isValid) return;

        // Apply formatting changes to main Invoice Number field
        const startNo = parseInt(popupStartNo.value) || 1;
        const width = parseInt(popupNumWidth.value) || 1;
        const prefill = popupPrefillZero.checked;

        invoiceInput.value = getFormattedInvoiceNo(prefixVal, startNo, width, prefill, suffixVal);

        closeModal();
    });

    // Initialize state on load
    document.addEventListener('DOMContentLoaded', () => {
        // Set default start date to today
        const todayStr = new Date().toISOString().split('T')[0];
        popupStartDate.value = todayStr;
        document.getElementById('invoice-date').value = todayStr;

        // Load existing draft from localStorage
        const draft = JSON.parse(localStorage.getItem('invoice_draft_step1') || '{}');
        
        if (draft.id) {
            invoiceInput.value = draft.id;
            if (draft.date) document.getElementById('invoice-date').value = draft.date;
            if (draft.poNumber) document.getElementById('po-num').value = draft.poNumber;
            if (draft.poDate) document.getElementById('po-date').value = draft.poDate;
            if (draft.ewayBillNumber) document.getElementById('eway-bill').value = draft.ewayBillNumber;
            if (draft.vehicleNumber) document.getElementById('vehicle-no').value = draft.vehicleNumber;
            if (draft.transportationMode) document.getElementById('transport-mode').value = draft.transportationMode;
            
            // Popups
            if (draft.startNo) popupStartNo.value = draft.startNo;
            if (draft.numWidth) popupNumWidth.value = draft.numWidth;
            if (draft.prefillZero !== undefined) popupPrefillZero.checked = draft.prefillZero;
            if (draft.prefix !== undefined) popupPrefix.value = draft.prefix;
            if (draft.suffix !== undefined) popupSuffix.value = draft.suffix;
            if (draft.startDate) popupStartDate.value = draft.startDate;
            if (draft.resetDate) popupResetDate.value = draft.resetDate;
        } else {
            // Apply initial default format
            invoiceInput.value = getFormattedInvoiceNo('INV', 1, 4, true, '');
        }
    });

    document.getElementById('invoice-details-form').addEventListener('submit', (e) => {
        e.preventDefault();

        const step1Data = {
            id: invoiceInput.value.trim(),
